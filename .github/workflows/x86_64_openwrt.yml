name: immortalwrt_x86_64

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/DHDAXCW/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: immortalwrt/x86_64/defconfig
  DIY_P1_SH: immortalwrt/diy-part1.sh
  DIY_P2_SH: immortalwrt/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  OPENWRT_NAME: immortalwrt
  OPENWRT_NAME1: x86_64

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Check out the project branch
      uses: actions/checkout@main
      with:
          fetch-depth: 0

    - name: Clean build caches
      run: |
        echo "正在清理旧的编译产物以释放空间..."
        sudo rm -rf openwrt || true

    - name: Initialize the compilation environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential clang flex g++ gawk gcc-multilib gettext \
        git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev swig libpython3-dev aria2 jq subversion qemu-utils ccache rename libelf-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Download firmware source code
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load DIY scripts & Config
      # 【核心修复】必须在 openwrt 目录下运行，否则 Part1 脚本找不到 package 文件夹
      working-directory: ./openwrt
      run: |
        chmod +x ../$OPENWRT_NAME/*.sh || true
        # 执行 Part 1 脚本
        [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && $GITHUB_WORKSPACE/$DIY_P1_SH
        # 加载 配置文件
        [ -e "$GITHUB_WORKSPACE/$CONFIG_FILE" ] && cat "$GITHUB_WORKSPACE/$CONFIG_FILE" > .config
        # 执行 Part 2 脚本
        [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download the installation package
      id: package
      working-directory: ./openwrt
      run: |
        make defconfig
        echo "正在下载依赖包..."
        make download -j3
        find dl -size -1024c -exec rm -f {} \;
              
    - name: Compile the firmware
      id: compile
      working-directory: ./openwrt
      run: |
        # 既然你有 4 核 EPYC 和 8G RAM + 8G Swap，用 3 线程既快又稳
        echo -e "正在以 3 线程安全模式编译..."
        make -j3 || make -j1 V=s
        echo "date1=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
        echo "date2=$(date '+%Y.%m.%d-%H%M')" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize and Rename Files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/x86/64
        rm -rf packages *.buildinfo *.manifest *.json sha256sums || true
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload the firmware to github
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.date1 }}_${{ env.OPENWRT_NAME }}_${{ env.OPENWRT_NAME1 }}
        path: ${{ env.FIRMWARE }}

    - name: Publish to release
      uses: softprops/action-gh-release@v2
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: ${{ env.OPENWRT_NAME }}_${{ env.OPENWRT_NAME1 }}_${{ env.date1 }}
        tag_name: ${{ env.date2 }}
        body: "📥 固件基于 AMD EPYC (3线程) 编译完成。"
